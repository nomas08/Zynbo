name: zynbo
description: "Zynbo — a modern WhatsApp-like chat application built with Flutter and Firebase."
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Google Sign-In
  google_sign_in: ^6.2.1

  # UI / utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  intl: ^0.19.0

  # Media (groups + voice notes)
  record: ^5.1.0
  just_audio: ^0.9.36
  permission_handler: ^11.2.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

# ─────────────── App icon generation ───────────────
# Run locally: `dart run flutter_launcher_icons`
# CI runs this automatically before each APK build.
flutter_launcher_icons:
  android: "ic_launcher"                # replaces the default Flutter icon
  ios: true                             # generates all iOS sizes
  image_path: "assets/icon/icon.png"    # source — 1254×1254 RGB

  # Android adaptive icons (Android 8+):
  # Black background matches the icon's own dark backdrop, so the rounded-square
  # design stays visually intact under any launcher mask.
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 23

  # Stop iOS from auto-removing alpha (we want the design preserved as-is)
  remove_alpha_ios: true
